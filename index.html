<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Polymarket 套利筛选器</title>
    <link rel="stylesheet" href="styles.css?v=12">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div id="pull-indicator" class="pull-indicator">下拉刷新</div>
    
    <header class="header">
        <h1>Polymarket 套利筛选</h1>
        <div class="search-bar">
            <input type="text" id="search-input" class="search-input" placeholder="搜索项目...">
        </div>
        <nav class="nav-tabs">
            <button class="tab-btn active" data-tab="discover">发现</button>
            <button class="tab-btn" data-tab="favorites">收藏</button>
            <button class="tab-btn" data-tab="orders">持仓</button>
        </nav>
    </header>

    <main class="main-content">
        <div id="discover-panel" class="panel active">
            <div class="filter-bar">
                <select id="category-filter" class="filter-select">
                    <option value="all">全部分类</option>
                    <option value="politics">政治</option>
                    <option value="crypto">加密货币</option>
                    <option value="sports">体育</option>
                    <option value="entertainment">娱乐</option>
                    <option value="science">科技</option>
                    <option value="business">商业</option>
                </select>
                <select id="sort-filter" class="filter-select">
                    <option value="volume">按交易量</option>
                    <option value="liquidity">按流动性</option>
                    <option value="ending">即将结束</option>
                    <option value="newest">最新</option>
                </select>
            </div>
            <div class="panel-actions">
                <button id="select-mode-btn" class="action-bar-btn">批量</button>
                <div id="batch-actions" class="hidden" style="display:contents">
                    <button id="batch-favorite" class="action-bar-btn primary">收藏选中</button>
                    <button id="batch-delete" class="action-bar-btn danger">删除选中</button>
                </div>
            </div>
            <div id="market-list" class="market-list"></div>
            <div id="loading" class="loading hidden"></div>
            <div id="load-more" class="load-more" style="display:none;">
                <button id="load-more-btn">加载更多</button>
            </div>
        </div>

        <div id="favorites-panel" class="panel">
            <div class="panel-actions">
                <button id="export-favorites" class="action-bar-btn">导出CSV</button>
            </div>
            <div id="favorites-list" class="market-list"></div>
            <div id="no-favorites" class="empty-state">
                <p>暂无收藏</p>
                <span>点击卡片上的星标收藏感兴趣的项目</span>
            </div>
        </div>

        <div id="orders-panel" class="panel">
            <div class="panel-actions">
                <button id="refresh-prices" class="action-bar-btn primary">刷新价格</button>
                <button id="export-orders" class="action-bar-btn">导出CSV</button>
            </div>
            <div id="orders-summary" class="orders-summary hidden"></div>
            <div id="orders-list" class="market-list"></div>
            <div id="no-orders" class="empty-state">
                <p>暂无持仓</p>
                <span>点击卡片上的 $ 按钮记录下单</span>
            </div>
        </div>
    </main>

    <button id="settings-btn" class="settings-btn" title="设置">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"></path>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"></path>
        </svg>
    </button>

    <div id="toast" class="toast"></div>

    <script src="app.js?v=12"></script>
</body>
</html>
